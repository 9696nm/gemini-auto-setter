<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Auto Setter - 設定</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #0f3460;
      --text: #e8e8e8;
      --text-muted: #a0a0a0;
      --border: #2a2a4a;
      --success: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 24px;
      min-width: 420px;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 24px;
      font-weight: 600;
    }
    section {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    section h2 {
      font-size: 0.95rem;
      margin: 0 0 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    select {
      width: 100%;
      padding: 10px 12px;
      background: var(--accent);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      background: var(--accent);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: monospace;
      resize: vertical;
    }
    textarea::placeholder {
      color: var(--text-muted);
    }
    .hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }
    button {
      background: var(--accent);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover {
      filter: brightness(1.1);
    }
    .saved {
      color: var(--success);
      font-size: 0.9rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Gemini Auto Setter - 設定</h1>

  <section>
    <h2>基本設定</h2>
    <label>
      <input type="checkbox" id="enabled" checked>
      拡張機能を有効にする
    </label>
    <label>
      <input type="checkbox" id="applyTemporaryChat" checked>
      一時チャットを自動で選択する
    </label>
    <label>
      <input type="checkbox" id="debugMode">
      デバッグモード（コンソールに詳細ログを出力）
    </label>
    <label>
      実行遅延（ミリ秒）:
      <input type="number" id="delayMs" min="0" max="15000" step="1000" value="1000" style="width:80px;">
    </label>
    <p class="hint">SPAの描画を待つ時間。0=即時、1000=1秒待機（推奨）</p>
  </section>

  <section>
    <h2>モード</h2>
    <select id="mode">
      <option value="thinking">思考モード (Thinking)</option>
      <option value="standard">標準 (Standard / Flash)</option>
      <option value="experimental">実験的 (Experimental / 2.5 Pro)</option>
      <option value="none">モードを自動選択しない</option>
    </select>
    <p class="hint">Geminiのモデルメニューから自動で選択するモードです。UIが変更された場合は正しく動作しない場合があります。</p>
  </section>

  <section>
    <h2>トリガーURL</h2>
    <textarea id="triggerUrls" placeholder="/u/1/app&#10;/app&#10;/u/1/app?pli=1"></textarea>
    <p class="hint">1行に1つ、トリガーとなるURLパスまたはパターンを入力してください。このいずれかにマッチする場合のみ自動適用されます。空の場合は常に適用します。</p>
  </section>

  <button id="save">保存</button>
  <p id="saved" class="saved" style="display:none;">保存しました</p>

  <script src="options.js"></script>
</body>
</html>
